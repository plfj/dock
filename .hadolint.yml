# =============================================================================
# .hadolint.yaml — Dockerfile linter configuration
# https://github.com/hadolint/hadolint
# =============================================================================

failure-threshold: error

ignore:
  # DL3008 — allow unpinned apt packages (base images evolve; pinning creates maintenance burden)
  - DL3008
  # DL3009 — apt-get clean is handled explicitly in each layer
  - DL3009
  # DL3013 — pip install latest versions intentional for runner base
  - DL3013
  # DL3016 — npm install latest intentional
  - DL3016
  # SC2086 — quoting handled explicitly where required
  - SC2086

trustedRegistries:
  - docker.io
  - ghcr.io
  - gcr.io
  - registry.k8s.io
